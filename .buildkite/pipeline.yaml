env:
  GO_VERSION: "1.26"
  ENV: "test"

agents:
  queue: "linux-small"

steps:
  - label: ":golang: lint"
    key: "lint"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make lint
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":test_tube: test"
    key: "test"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make test
    depends_on: "lint"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":bar_chart: coverage"
    key: "coverage"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make coverage
    depends_on: "test"
    artifact_paths:
      - "coverage.out"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":hammer: build workers"
    key: "build-workers"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make build
    depends_on: "test"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":package: package lambdas"
    key: "package-lambdas"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make package-lambdas
    depends_on: "build-workers"
    artifact_paths:
      - "dist/*.zip"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":cloudformation: cdk synth"
    key: "cdk-synth"
    command: |
      if [ ! -f "../card-onboarding-services/go.mod" ]; then
        rm -rf ../card-onboarding-services
        git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git ../card-onboarding-services
      fi
      make cdk-synth
    depends_on: "package-lambdas"

  - block: "Deploy to test?"
    key: "deploy-test-approval"
    depends_on: "cdk-synth"
    branches: "main"

  - label: ":rocket: deploy test"
    key: "deploy-test"
    command: |
      if [ ! -f "../card-onboarding-services/go.mod" ]; then
        rm -rf ../card-onboarding-services
        git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git ../card-onboarding-services
      fi
      make deploy-test
    depends_on: "deploy-test-approval"
    branches: "main"

  - label: ":white_check_mark: smoke tests"
    key: "smoke-tests"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make smoke-test
    depends_on: "deploy-test"
    branches: "main"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - block: "Deploy to production?"
    key: "deploy-prod-approval"
    depends_on: "smoke-tests"
    branches: "main"

  - label: ":rocket: deploy production"
    key: "deploy-prod"
    command: |
      if [ ! -f "../card-onboarding-services/go.mod" ]; then
        rm -rf ../card-onboarding-services
        git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git ../card-onboarding-services
      fi
      make deploy-prod
    depends_on: "deploy-prod-approval"
    branches: "main"
