env:
  GO_VERSION: "1.26"
  ENV: "test"
  AWS_PAGER: ""

agents:
  queue: "linux-small"

steps:
  - label: ":golang: lint"
    key: "lint"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make lint
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":test_tube: test"
    key: "test"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make test
    depends_on: "lint"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":bar_chart: coverage"
    key: "coverage"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make coverage
    depends_on: "test"
    artifact_paths:
      - "coverage.out"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":hammer: build workers"
    key: "build-workers"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make build
    depends_on: "test"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":package: package lambdas"
    key: "package-lambdas"
    command: |
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make package-lambdas
    depends_on: "build-workers"
    artifact_paths:
      - "dist/*.zip"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - label: ":cloudformation: cdk synth"
    key: "cdk-synth"
    command: |
      apt-get update
      apt-get install -y ca-certificates curl
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      npm install --global aws-cdk@2
      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      make cdk-synth
    depends_on: "package-lambdas"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir

  - block: "Deploy to test?"
    key: "deploy-test-approval"
    depends_on: "cdk-synth"
    branches: "main"

  - label: ":rocket: deploy test"
    key: "deploy-test"
    command: |
      apt-get update
      apt-get install -y ca-certificates curl unzip awscli
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      npm install --global aws-cdk@2

      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      cd /card-onboarding-services

      aws sts get-caller-identity
      aws configure list

      make deploy-test
    depends_on: "deploy-test-approval"
    branches: "main"
    secrets:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - AWS_ACCOUNT_ID
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          environment:
            - AWS_ACCESS_KEY_ID
            - AWS_SECRET_ACCESS_KEY
            - AWS_REGION
            - AWS_DEFAULT_REGION
            - AWS_ACCOUNT_ID
            - AWS_PAGER

  - label: ":white_check_mark: smoke tests"
    key: "smoke-tests"
    command: |
      apt-get update
      apt-get install -y awscli

      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      cd /card-onboarding-services

      aws sts get-caller-identity

      make smoke-test
    depends_on: "deploy-test"
    branches: "main"
    secrets:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - AWS_ACCOUNT_ID
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          environment:
            - AWS_ACCESS_KEY_ID
            - AWS_SECRET_ACCESS_KEY
            - AWS_REGION
            - AWS_DEFAULT_REGION
            - AWS_ACCOUNT_ID
            - AWS_PAGER

  - block: "Deploy to production?"
    key: "deploy-prod-approval"
    depends_on: "smoke-tests"
    branches: "main"

  - label: ":rocket: deploy production"
    key: "deploy-prod"
    command: |
      apt-get update
      apt-get install -y ca-certificates curl unzip awscli
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      npm install --global aws-cdk@2

      git clone --depth 1 https://github.com/NguyenHoangNguyen22120236/card-onboarding-services.git /card-onboarding-services
      cd /card-onboarding-services

      aws sts get-caller-identity
      aws configure list

      make deploy-prod
    depends_on: "deploy-prod-approval"
    branches: "main"
    secrets:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - AWS_ACCOUNT_ID
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          environment:
            - AWS_ACCESS_KEY_ID
            - AWS_SECRET_ACCESS_KEY
            - AWS_REGION
            - AWS_DEFAULT_REGION
            - AWS_ACCOUNT_ID
            - AWS_PAGER
