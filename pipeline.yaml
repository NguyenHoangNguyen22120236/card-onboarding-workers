env:
  GO_VERSION: "1.26"
  ENV: "test"

steps:
  - label: ":golang: lint"
    key: "lint"
    command: "make lint"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          volumes:
            - ".:/workdir"
            - "../card-onboarding-services:/card-onboarding-services"

  - label: ":test_tube: test"
    key: "test"
    command: "make test"
    depends_on: "lint"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          volumes:
            - ".:/workdir"
            - "../card-onboarding-services:/card-onboarding-services"

  - label: ":bar_chart: coverage"
    key: "coverage"
    command: "make coverage"
    depends_on: "test"
    artifact_paths:
      - "coverage.out"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          volumes:
            - ".:/workdir"
            - "../card-onboarding-services:/card-onboarding-services"

  - label: ":hammer: build workers"
    key: "build-workers"
    command: "make build"
    depends_on: "test"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          volumes:
            - ".:/workdir"
            - "../card-onboarding-services:/card-onboarding-services"

  - label: ":package: package lambdas"
    key: "package-lambdas"
    command: "make package-lambdas"
    depends_on: "build-workers"
    artifact_paths:
      - "dist/*.zip"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          volumes:
            - ".:/workdir"
            - "../card-onboarding-services:/card-onboarding-services"

  - label: ":cloudformation: cdk synth"
    key: "cdk-synth"
    command: "make cdk-synth"
    depends_on: "package-lambdas"

  - block: "Deploy to test?"
    key: "deploy-test-approval"
    depends_on: "cdk-synth"
    branches: "main"

  - label: ":rocket: deploy test"
    key: "deploy-test"
    command: "make deploy-test"
    depends_on: "deploy-test-approval"
    branches: "main"

  - label: ":white_check_mark: smoke tests"
    key: "smoke-tests"
    command: "make smoke-test"
    depends_on: "deploy-test"
    branches: "main"
    plugins:
      - docker#v5.13.0:
          image: "golang:${GO_VERSION}"
          workdir: /workdir
          volumes:
            - ".:/workdir"
            - "../card-onboarding-services:/card-onboarding-services"

  - block: "Deploy to production?"
    key: "deploy-prod-approval"
    depends_on: "smoke-tests"
    branches: "main"

  - label: ":rocket: deploy production"
    key: "deploy-prod"
    command: "make deploy-prod"
    depends_on: "deploy-prod-approval"
    branches: "main"
